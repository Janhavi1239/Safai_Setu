<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>Safai Setu | Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Poppins;
background:#f4f7f9;
}

#map{
height:420px;
border-radius:10px;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("role") !== "admin"){
alert("Access Denied");
window.location.href="login.html";
}

</script>

<nav class="navbar navbar-dark bg-success px-4">

<span class="navbar-brand fw-bold">Safai Setu Admin</span>

<button onclick="logout()" class="btn btn-light btn-sm">Logout</button>

</nav>

<div class="container mt-5">

<h4 class="mb-4">Garbage Complaints</h4>

<div class="card shadow">

<div class="card-body">

<table class="table table-bordered table-hover">

<thead class="table-success">

<tr>

<th>Photo</th>
<th>ID</th>
<th>Zone</th>
<th>Location</th>
<th>Description</th>
<th>Status</th>
<th>Assign Incharge</th>

</tr>

</thead>

<tbody id="complaintTable"></tbody>

</table>

</div>
</div>

<h4 class="mt-5 mb-3">Live Complaint Map</h4>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ---------------- MAP ----------------

var map = L.map('map').setView([19.9975,73.7898],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OpenStreetMap'
}).addTo(map);


// ---------------- LOAD COMPLAINTS ----------------

fetch("http://127.0.0.1:5001/complaints")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("complaintTable");
table.innerHTML="";

data.forEach(c=>{

// STATUS COLOR
let statusColor="bg-warning";

if(c.status==="In Progress"){
statusColor="bg-info";
}

if(c.status==="Completed"){
statusColor="bg-success";
}

let row=document.createElement("tr");

row.innerHTML=`

<td>
<img src="http://127.0.0.1:5001/${c.before_image}" width="70" class="img-thumbnail">
</td>

<td>${c.id}</td>

<td>${c.zone}</td>

<td>${c.location}</td>

<td>${c.description}</td>

<td>
<span class="badge ${statusColor}">
${c.status}
</span>
</td>

<td>

${c.status==="Pending" ? `

<button class="btn btn-success btn-sm"
onclick="assignIncharge(${c.id},'${c.zone}')">
Assign
</button>

` : `<span class="badge bg-secondary">Assigned</span>`}

</td>

`;

table.appendChild(row);


//  MAP MARKER 

if(c.location){

let coords=c.location.split(",");

if(coords.length==2){

let lat=parseFloat(coords[0]);
let lon=parseFloat(coords[1]);

L.marker([lat,lon])
.addTo(map)
.bindPopup(

"<b>Complaint ID:</b> "+c.id+
"<br><b>Zone:</b> "+c.zone+
"<br><b>Status:</b> "+c.status+
"<br>"+c.description

);

}

}

});

});


//  ASSIGN INCHARGE 

function assignIncharge(id,zone){

let incharge_id=0;

if(zone==="West Nashik"){
incharge_id=2;
}

if(zone==="Panchavati"){
incharge_id=3;
}

fetch("http://127.0.0.1:5001/assign_incharge",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
complaint_id:id,
incharge_id:incharge_id
})

})

.then(res=>res.json())

.then(data=>{
alert(data.message);
location.reload();
});

}


//  LOGOUT 

function logout(){
localStorage.clear();
window.location.href="index.html";
}

</script>

</body>
</html>
